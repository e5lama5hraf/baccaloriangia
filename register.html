<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | البكالورينجية</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #123c8c;
            --secondary: #0bb6d6;
            --accent: #ffb703;
            --dark: #071a3d;
            --light: #f4f8ff;
            --white: #ffffff;
            --text: #1d2b45;
            --muted: #6c7890;
            --danger: #ff4d6d;
            --success: #0f9f6e;
            --radius: 24px;
            --shadow: 0 18px 40px rgba(7, 26, 61, 0.12);
            --soft-shadow: 0 12px 28px rgba(7, 26, 61, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Cairo", sans-serif;
            background: var(--light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
        }

        .register-card {
            width: 100%;
            max-width: 520px;
            background: var(--white);
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            margin: auto;
            border-radius: 22px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .logo h1 {
            margin-top: 15px;
            color: var(--dark);
            font-size: 30px;
            font-weight: 900;
        }

        .logo p {
            color: var(--muted);
            margin-top: 6px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 800;
            color: var(--dark);
        }

        .form-control {
            width: 100%;
            height: 56px;
            border-radius: 16px;
            border: 1px solid #d9e3f2;
            padding: 0 16px;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: .3s;
        }

        .form-control:focus {
            border-color: var(--secondary);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            cursor: pointer;
            font-size: 18px;
        }

        .btn {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 16px;
            font-family: inherit;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            color: white;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 15px;
            padding: 14px;
            border-radius: 14px;
            display: none;
            font-weight: 800;
            line-height: 1.8;
        }

        .error {
            background: rgba(255, 77, 109, .1);
            color: var(--danger);
        }

        .success {
            background: rgba(15, 159, 110, .1);
            color: var(--success);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: var(--muted);
            font-weight: 700;
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 900;
        }

        @media(max-width:600px) {
            .register-card {
                padding: 25px;
            }

            .logo h1 {
                font-size: 26px;
            }
        }
    </style>
</head>

<body>

    <div class="register-card">

        <div class="logo">
            <div class="logo-icon">ب</div>

            <h1>إنشاء حساب</h1>

            <p>
                انضم الآن إلى منصة البكالورينجية
            </p>
        </div>

        <form id="registerForm">

            <div class="form-group">
                <label for="fullName">الاسم بالكامل</label>
                <input type="text" id="fullName" class="form-control" placeholder="أدخل اسمك بالكامل" required>
            </div>

            <div class="form-group">
                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="phone">رقم الهاتف</label>
                <input type="tel" id="phone" class="form-control" placeholder="01xxxxxxxxx" required>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>

                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="********" required>

                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        👁
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">تأكيد كلمة المرور</label>

                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="********" required>

                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                        👁
                    </button>
                </div>
            </div>

            <button class="btn" id="submitBtn" type="submit">
                إنشاء الحساب
            </button>

            <div id="errorMessage" class="message error"></div>
            <div id="successMessage" class="message success"></div>

        </form>

        <div class="login-link">
            لديك حساب بالفعل؟
            <a href="login.html">
                تسجيل الدخول
            </a>
        </div>

    </div>

    <script>
        /*
            1) افتح Supabase
            2) ادخل على Project Settings
            3) API
            4) انسخ Project URL و anon public key
        */

        const SUPABASE_URL = "https://gnxhzpskxhgxrlnrfnew.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdueGh6cHNreGhneHJsbnJmbmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODc2NTIsImV4cCI6MjA5NzI2MzY1Mn0.FyJY10Dif0tFAVFMnVjINrpjR4dPZShLxvrYezhc0TI";

        const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        const registerForm = document.getElementById("registerForm");
        const errorMessage = document.getElementById("errorMessage");
        const successMessage = document.getElementById("successMessage");
        const submitBtn = document.getElementById("submitBtn");

        function togglePassword(id) {
            const input = document.getElementById(id);

            input.type = input.type === "password"
                ? "text"
                : "password";
        }

        function showError(message) {
            successMessage.style.display = "none";

            errorMessage.textContent = message;
            errorMessage.style.display = "block";
        }

        function showSuccess(message) {
            errorMessage.style.display = "none";

            successMessage.textContent = message;
            successMessage.style.display = "block";
        }

        registerForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            errorMessage.style.display = "none";
            successMessage.style.display = "none";

            const fullName = document.getElementById("fullName").value.trim();
            const email = document.getElementById("email").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (!fullName || !email || !phone || !password || !confirmPassword) {
                showError("من فضلك املأ كل البيانات المطلوبة");
                return;
            }

            if (password.length < 6) {
                showError("كلمة المرور يجب ألا تقل عن 6 أحرف");
                return;
            }

            if (password !== confirmPassword) {
                showError("كلمتا المرور غير متطابقتين");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "جاري إنشاء الحساب...";

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            phone: phone
                        }
                    }
                });

                if (error) {
                    showError(error.message);
                    return;
                }

                /*
                    لو Supabase مفعل تأكيد البريد الإلكتروني:
                    المستخدم سيحتاج يفتح الإيميل ويأكد الحساب.
                */

                showSuccess("تم إنشاء الحساب بنجاح. من فضلك تحقق من بريدك الإلكتروني إذا كان تفعيل البريد مفعلًا.");

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 1800);

            } catch (err) {
                showError("حدث خطأ غير متوقع. حاول مرة أخرى.");
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "إنشاء الحساب";
            }
        });
    </script>

</body>

</html>
