<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول | البكالورينجية</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #123c8c;
            --secondary: #0bb6d6;
            --accent: #ffb703;
            --dark: #071a3d;
            --light: #f4f8ff;
            --white: #ffffff;
            --text: #1d2b45;
            --muted: #6c7890;
            --danger: #ff4d6d;
            --success: #0f9f6e;
            --radius: 24px;
            --shadow: 0 18px 40px rgba(7, 26, 61, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Cairo", sans-serif;
        }

        body {
            background:
                radial-gradient(circle at 12% 15%, rgba(11, 182, 214, 0.16), transparent 26%),
                radial-gradient(circle at 88% 10%, rgba(255, 183, 3, 0.18), transparent 24%),
                var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        a {
            color: inherit;
        }

        .card {
            width: min(420px, 92%);
            background: var(--white);
            border: 1px solid rgba(18, 60, 140, 0.08);
            border-radius: var(--radius);
            padding: 30px 28px;
            box-shadow: var(--shadow);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--primary);
            font-size: 19px;
            font-weight: 900;
            text-decoration: none;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            display: grid;
            place-items: center;
            font-size: 18px;
            box-shadow: 0 10px 22px rgba(18, 60, 140, 0.25);
            flex-shrink: 0;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 6px;
            color: var(--dark);
            font-weight: 900;
        }

        p {
            color: var(--muted);
            margin-bottom: 18px;
            font-weight: 600;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(18, 60, 140, 0.15);
            margin-bottom: 12px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            background: var(--white);
            color: var(--text);
        }

        .input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(11, 182, 214, 0.15);
        }

        /* حقل كلمة المرور + أيقونة الإظهار/الإخفاء */
        .password-field {
            position: relative;
        }

        .password-field .input {
            padding-left: 46px;
        }

        .password-toggle-btn {
            position: absolute;
            left: 6px;
            top: 0;
            bottom: 12px;
            margin: auto 0;
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            display: grid;
            place-items: center;
            border-radius: 10px;
            font-size: 18px;
            line-height: 1;
            transition: 0.2s;
        }

        .password-toggle-btn:hover {
            background: #eef4ff;
            color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 999px;
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            transition: 0.3s;
            margin-top: 6px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            font-size: 13px;
            margin-top: 10px;
            display: none;
            font-weight: 700;
            line-height: 1.7;
        }

        .error {
            color: var(--danger);
        }

        .success {
            color: var(--success);
        }

        .switch {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }

        .switch a {
            color: var(--primary);
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <a href="index.html" class="auth-logo">
            <span class="logo-icon">ب</span>
            البكالورينجية
        </a>

        <h1>تسجيل الدخول</h1>
        <p>ادخل البريد وكلمة المرور للدخول إلى المنصة</p>

        <form id="loginForm">
            <input type="email" id="email" class="input" placeholder="البريد الإلكتروني" required>

            <div class="password-field">
                <input type="password" id="password" class="input" placeholder="كلمة المرور" required>
                <button type="button" class="password-toggle-btn" id="togglePassword" aria-label="إظهار كلمة المرور">👁️</button>
            </div>

            <div class="message error" id="errorMessage">من فضلك أدخل بيانات صحيحة</div>
            <div class="message success" id="successMessage">تم تسجيل الدخول بنجاح</div>

            <button class="btn" id="loginBtn" type="submit">دخول</button>
        </form>

        <div class="switch">
            ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a>
        </div>
    </div>

    <script>
        /*
            هنا حط نفس بيانات Supabase اللي حطيتها في صفحة register.html
        */

        const SUPABASE_URL = "https://gnxhzpskxhgxrlnrfnew.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdueGh6cHNreGhneHJsbnJmbmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODc2NTIsImV4cCI6MjA5NzI2MzY1Mn0.FyJY10Dif0tFAVFMnVjINrpjR4dPZShLxvrYezhc0TI";

        const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        const loginForm = document.getElementById("loginForm");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");
        const errorMessage = document.getElementById("errorMessage");
        const successMessage = document.getElementById("successMessage");
        const loginBtn = document.getElementById("loginBtn");

        // ---------- إظهار/إخفاء كلمة المرور ----------
        togglePassword.addEventListener("click", () => {
            const isHidden = passwordInput.type === "password";

            passwordInput.type = isHidden ? "text" : "password";
            togglePassword.textContent = isHidden ? "🙈" : "👁️";
            togglePassword.setAttribute("aria-label", isHidden ? "إخفاء كلمة المرور" : "إظهار كلمة المرور");
        });

        // ---------- مكان الرجوع بعد تسجيل الدخول ----------
        // الصفحات التانية في الموقع بتبعت login.html?redirect=... وهنا لازم نقراها وننفذها فعليًا
        // const urlParams = new URLSearchParams(window.location.search);

        // function getSafeRedirect() {
        //     const target = urlParams.get("redirect");

        //     if (!target) {
        //         return "index.html";
        //     }

        //     // حماية بسيطة من open-redirect: نسمح بمسارات داخل الموقع بس،
        //     // مش لينكات لمواقع خارجية حد ممكن يحط في الرابط
        //     if (
        //         target.startsWith("http://") ||
        //         target.startsWith("https://") ||
        //         target.startsWith("//")
        //     ) {
        //         return "index.html";
        //     }

        //     return target;
        // }

        // لو الطالب أصلاً مسجل دخول وفتح صفحة الدخول تاني، نوديه على طول لمكانه
        async function checkExistingSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();

            if (session) {
                window.location.href = getSafeRedirect();
            }
        }

        checkExistingSession();

        function showError(message) {
            successMessage.style.display = "none";

            errorMessage.textContent = message;
            errorMessage.style.display = "block";
        }

        function showSuccess(message) {
            errorMessage.style.display = "none";

            successMessage.textContent = message;
            successMessage.style.display = "block";
        }

        loginForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            errorMessage.style.display = "none";
            successMessage.style.display = "none";

            if (!emailRegex.test(email)) {
                showError("من فضلك أدخل بريد إلكتروني صحيح");
                return;
            }

            if (password.length < 6) {
                showError("كلمة المرور يجب ألا تقل عن 6 أحرف");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "جاري تسجيل الدخول...";

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    showError("البريد الإلكتروني أو كلمة المرور غير صحيحة");
                    loginBtn.disabled = false;
                    loginBtn.textContent = "دخول";
                    return;
                }

                showSuccess("تم تسجيل الدخول بنجاح، جاري تحويلك...");
                loginBtn.textContent = "جاري التحويل...";

                setTimeout(() => {
                    window.location.href = getSafeRedirect();
                }, 800);

            } catch (err) {
                showError("حدث خطأ غير متوقع. حاول مرة أخرى.");
                console.error(err);
                loginBtn.disabled = false;
                loginBtn.textContent = "دخول";
            }
        });
    </script>

</body>

</html>
