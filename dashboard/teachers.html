    <style>
        :root {
            --primary: #123c8c;

        body {

        .dashboard {

        .sidebar {
            width: 280px;

        .sidebar a:hover,
        .sidebar .active a {

        }

        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 30px;
        }

        .page-header {
            background: white;
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: var(--soft-shadow);

        .add-btn {
            border: none;

        table {

        .modal {

        .form-grid {

        .form-group {

        .form-group label {

        .form-group input,

        .save-btn {

        }

        #toast {

        }

        @media(max-width:768px) {
            .form-grid {

        }

        @media(max-width:992px) {
            .dashboard {

            }

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = "https://gnxhzpskxhgxrlnrfnew.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdueGh6cHNreGhneHJsbnJmbmV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODc2NTIsImV4cCI6MjA5NzI2MzY1Mn0.FyJY10Dif0tFAVFMnVjINrpjR4dPZShLxvrYezhc0TI";

        const db = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_KEY
        );

        let teachers = [];

        const modal = document.getElementById("teacherModal");
        const openModalBtn = document.getElementById("openModalBtn");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const teacherForm = document.getElementById("teacherForm");
        const imageFileInput = document.getElementById("imageFile");
        const imagePreview = document.getElementById("imagePreview");
        const searchInput = document.getElementById("searchInput");
        const stageFilter = document.getElementById("stageFilter");
        const pathFilter = document.getElementById("pathFilter");

        function getSelectedPaths() {
            return [
                ...document.querySelectorAll(".path-checkbox:checked")
            ].map(item => item.value);
        }

        function setSelectedPaths(paths) {
            document
                .querySelectorAll(".path-checkbox")
                .forEach(item => {
                    item.checked = false;
                });

            if (!Array.isArray(paths)) return;

            paths.forEach(path => {
                const checkbox = document.querySelector(
                    `.path-checkbox[value="${path}"]`
                );

                if (checkbox) {
                    checkbox.checked = true;
                }
            });
        }

        function getPathsText(path) {
            if (!path || !Array.isArray(path) || !path.length) {
                return "-";
            }

            const pathsMap = {
                medicine: "طب",
                engineering: "هندسة",
                arts: "أدبي",
                business: "إدارة أعمال"
            };

            return path
                .map(item => pathsMap[item] || item)
                .join(" - ");
        }

        function applyFilters() {
            const keyword = searchInput.value.toLowerCase();
            const selectedStage = stageFilter.value;
            const selectedPath = pathFilter.value;

            const filtered = teachers.filter(teacher => {
                const matchesSearch =
                    (teacher.name || "")
                        .toLowerCase()
                        .includes(keyword)
                    ||
                    (teacher.subject || "")
                        .toLowerCase()
                        .includes(keyword);

                const matchesStage =
                    !selectedStage ||
                    teacher.stage === selectedStage;

                const matchesPath =
                    !selectedPath ||
                    (
                        Array.isArray(teacher.path) &&
                        teacher.path.includes(selectedPath)
                    );

                return matchesSearch && matchesStage && matchesPath;
            });

            renderTeachers(filtered);
        }

        async function loadTeachers() {
            try {
                const { data, error } = await db
                    .from("teachers")
                    .select("*")
                    .order("id", {
                        ascending: false
                    });

                if (error) throw error;

                teachers = data || [];

                renderTeachers(teachers);
            }

            catch (error) {
                console.error(error);
                alert("فشل تحميل المدرسين");
            }
        }

        function renderTeachers(data) {
            const table = document.getElementById("teachersTable");

            table.innerHTML = "";

            if (!data.length) {
                table.innerHTML = `
                <tr>
                    <td colspan="7">
                        لا يوجد مدرسين
                    </td>
                </tr>
            `;

                return;
            }

            data.forEach(teacher => {
                table.innerHTML += `
                <tr>
                    <td>
                        <img
                            class="teacher-image"
                            src="${teacher.image || 'https://placehold.co/60'}">
                    </td>

                    <td>
                        ${teacher.name || '-'}
                    </td>

                    <td>
                        ${teacher.subject || '-'}
                    </td>

                    <td>
                        ${teacher.stage || '-'}
                    </td>

                    <td>
                        ${getPathsText(teacher.path)}
                    </td>

                    <td>
                        <span class="status ${teacher.is_active ? 'active-status' : 'inactive-status'}">
                            ${teacher.is_active ? 'نشط' : 'غير نشط'}
                        </span>
                    </td>

                    <td>
                        <div class="actions">
                            <button
                                class="edit-btn"
                                onclick="editTeacher(${teacher.id})">
                                تعديل
                            </button>

                            <button
                                class="delete-btn"
                                onclick="deleteTeacher(${teacher.id})">
                                حذف
                            </button>

                            <button
                                class="status-toggle"
                                onclick="toggleTeacherStatus(${teacher.id})">
                                ${teacher.is_active ? "تعطيل" : "تفعيل"}
                            </button>
                        </div>
                    </td>
                </tr>
            `;
            });
        }

        async function saveTeacher(e) {
            e.preventDefault();

            const imageFile = imageFileInput.files[0];

            let imageUrl = undefined;

            const teacherId = document.getElementById("teacherId").value;

            if (imageFile) {
                imageUrl = await uploadTeacherImage(imageFile);
            }

            const selectedPaths = getSelectedPaths();

            const teacherData = {
                ...(imageUrl !== undefined && {
                    image: imageUrl
                }),

                name: document.getElementById("name").value.trim(),

                subject: document.getElementById("subject").value.trim(),

                stage: document.getElementById("stage").value,

                path: selectedPaths.length ? selectedPaths : null,

                bio: document.getElementById("bio").value.trim() || null,

                facebook_url: document.getElementById("facebook_url").value.trim() || null,

                whatsapp_url: document.getElementById("whatsapp_url").value.trim() || null,

                telegram_url: document.getElementById("telegram_url").value.trim() || null,

                youtube_url: document.getElementById("youtube_url").value.trim() || null,

                photo_label: document.getElementById("photo_label").value.trim() || null,

                is_active: true
            };

            try {
                if (teacherId) {
                    const { error } = await db
                        .from("teachers")
                        .update(teacherData)
                        .eq("id", teacherId);

                    if (error) throw error;
                }

                else {
                    const { error } = await db
                        .from("teachers")
                        .insert(teacherData);

                    if (error) throw error;
                }

                modal.classList.remove("show");

                teacherForm.reset();

                imagePreview.style.display = "none";
                imagePreview.src = "";

                document.getElementById("teacherId").value = "";

                setSelectedPaths([]);

                await loadTeachers();

                showToast("تم حفظ بيانات المدرس بنجاح");
            }

            catch (error) {
                console.error(error);
                alert("فشل حفظ البيانات");
            }
        }

        function editTeacher(id) {
            const teacher = teachers.find(t => t.id === id);

            if (!teacher) return;

            document.getElementById("teacherId").value = teacher.id;

            document.getElementById("name").value = teacher.name || "";

            document.getElementById("subject").value = teacher.subject || "";

            document.getElementById("stage").value = teacher.stage || "";

            document.getElementById("bio").value = teacher.bio || "";

            document.getElementById("facebook_url").value = teacher.facebook_url || "";

            document.getElementById("whatsapp_url").value = teacher.whatsapp_url || "";

            document.getElementById("telegram_url").value = teacher.telegram_url || "";

            document.getElementById("youtube_url").value = teacher.youtube_url || "";

            document.getElementById("photo_label").value = teacher.photo_label || "";

            document.getElementById("modalTitle").innerText = "تعديل المدرس";

            setSelectedPaths(teacher.path);

            if (teacher.image) {
                imagePreview.src = teacher.image;
                imagePreview.style.display = "block";
            }

            else {
                imagePreview.src = "";
                imagePreview.style.display = "none";
            }

            imageFileInput.value = "";

            modal.classList.add("show");
        }

        async function deleteTeacher(id) {
            const confirmed = confirm(
                "هل أنت متأكد من حذف المدرس ؟"
            );

            if (!confirmed) return;

            try {
                const { error } = await db
                    .from("teachers")
                    .delete()
                    .eq("id", id);

                if (error) throw error;

                await loadTeachers();

                showToast("تم حذف المدرس بنجاح");
            }

            catch (error) {
                console.error(error);
                alert("فشل الحذف");
            }
        }

        async function uploadTeacherImage(file) {
            if (!file) return null;

            const fileName = Date.now() + "-" + file.name;

            const { error } = await db.storage
                .from("teacher-images")
                .upload(fileName, file);

            if (error) {
                throw error;
            }

            const { data } = db.storage
                .from("teacher-images")
                .getPublicUrl(fileName);

            return data.publicUrl;
        }

        async function toggleTeacherStatus(id) {
            const teacher = teachers.find(
                t => t.id === id
            );

            if (!teacher) return;

            const { error } = await db
                .from("teachers")
                .update({
                    is_active: !teacher.is_active
                })
                .eq("id", id);

            if (error) {
                console.error(error);
                alert("فشل تغيير حالة المدرس");
                return;
            }

            await loadTeachers();

            showToast("تم تغيير حالة المدرس");
        }

        function showToast(message) {
            const toast = document.getElementById("toast");

            toast.innerText = message;

            toast.style.display = "block";

            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }

        searchInput.addEventListener("input", applyFilters);
        stageFilter.addEventListener("change", applyFilters);
        pathFilter.addEventListener("change", applyFilters);

        openModalBtn.addEventListener("click", () => {
            teacherForm.reset();

            document.getElementById("teacherId").value = "";

            document.getElementById("modalTitle").innerText = "إضافة مدرس جديد";

            imagePreview.src = "";
            imagePreview.style.display = "none";

            imageFileInput.value = "";

            setSelectedPaths([]);

            modal.classList.add("show");
        });

        closeModalBtn.addEventListener("click", () => {
            modal.classList.remove("show");
        });

        window.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.classList.remove("show");
            }
        });

        imageFileInput.addEventListener("change", function () {
            const file = this.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = "block";
            };

            reader.readAsDataURL(file);
        });

        teacherForm.addEventListener("submit", saveTeacher);

        loadTeachers();
    </script>
